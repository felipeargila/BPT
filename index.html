    // ==================== FUNÇÃO PARA CALCULAR PORTE ====================
    function calcularPorte(populacao) {
        if (populacao > 300000) return "+300k";
        if (populacao > 150000) return "150k-300k";
        if (populacao > 50000) return "50k-150k";
        return "até 50k";
    }

    function getCorPorte(porte) {
        if (porte === '+300k') return 'badge-porte-4';
        if (porte === '150k-300k') return 'badge-porte-3';
        if (porte === '50k-150k') return 'badge-porte-2';
        return 'badge-porte-1';
    }

    // ==================== CALCULAR PORTE E SCORE ====================
    function calcularScore(m) {
        let score = 0;
        score += m.risco === 'Alto' ? 3 : m.risco === 'Médio' ? 2 : 1;
        score += m.status === 'SEM REGISTRO' ? 3 : m.status === 'EM DESENVOLVIMENTO' ? 1 : 0;
        score += m.emergencia ? 2 : 0;
        score += m.tem_barragens ? 3 : 0;
        if (m.porte === '+300k') score += 3;
        else if (m.porte === '150k-300k') score += 2;
        else if (m.porte === '50k-150k') score += 1;
        score += m.pib_per_capita > 40000 ? 2 : 0;
        return score;
    }

    // Aplicar porte e score
    municipios.forEach(m => {
